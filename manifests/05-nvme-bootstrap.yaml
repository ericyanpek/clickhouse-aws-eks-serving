# NVMe bootstrap for ClickHouse nodes.
#
# WHY: i8g instances ship a local NVMe instance-store disk, but the AL2023 EKS AMI does
# NOT format or mount it. The local-static-provisioner (installed by Terraform) only
# publishes PVs for disks already mounted under /mnt/disks. Without this DaemonSet the
# NVMe stays raw, no local PVs appear, and the ClickHouse PVCs stay Pending forever.
#
# WHAT: a privileged DaemonSet on the clickhouse node pool that, per node, finds the
# unmounted instance-store NVMe device, makes an ext4 filesystem on it once (idempotent),
# and bind-ready mounts it at /mnt/disks/<device> so the provisioner discovers it.
#
# NOTE: instance-store data is ephemeral (lost on stop/terminate) — that is intended here;
# durability comes from the 3 replicas + S3 backup. The DaemonSet only formats a disk that
# has NO filesystem, so it will not wipe an already-provisioned disk on pod restart.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvme-bootstrap
  namespace: kube-system
  labels:
    app: nvme-bootstrap
spec:
  selector:
    matchLabels:
      app: nvme-bootstrap
  template:
    metadata:
      labels:
        app: nvme-bootstrap
    spec:
      # Only on ClickHouse nodes; tolerate their dedicated taint.
      nodeSelector:
        workload: clickhouse
      tolerations:
        - key: dedicated
          operator: Equal
          value: clickhouse
          effect: NoSchedule
      hostPID: true
      containers:
        - name: bootstrap
          image: public.ecr.aws/amazonlinux/amazonlinux:2023
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              MNT_ROOT=/mnt/disks
              mkdir -p "$MNT_ROOT"

              # e2fsprogs (mkfs.ext4) + util-linux (mount) are needed; the minimal AL2023
              # image may lack mkfs.ext4. Install quietly if missing (idempotent, cached after first run).
              command -v mkfs.ext4 >/dev/null 2>&1 || dnf install -y -q e2fsprogs util-linux >/dev/null 2>&1 || true

              echo "[nvme-bootstrap] scanning for instance-store NVMe devices..."
              # Detect via sysfs model string (always present; no nvme-cli/lsblk/xargs dependency).
              # Amazon instance-store NVMe model = "Amazon EC2 NVMe Instance Storage".
              # EBS volumes model = "Amazon Elastic Block Store" — we must NEVER touch those.
              for dev in /dev/nvme*n1; do
                [ -b "$dev" ] || continue
                b=$(basename "$dev")
                model=$(cat "/sys/block/$b/device/model" 2>/dev/null || echo "")
                echo "[nvme-bootstrap] $dev model='$model'"
                case "$model" in
                  *"Instance Storage"*) ;;     # instance-store — proceed
                  *) echo "[nvme-bootstrap] skip $dev (not instance storage)"; continue ;;
                esac

                # Skip if already mounted (idempotent across pod restarts).
                if grep -q "^$dev " /proc/mounts; then
                  echo "[nvme-bootstrap] $dev already mounted, skip"; continue
                fi

                # Make a filesystem only if the device has none (blkid returns non-zero when unformatted).
                if ! blkid "$dev" >/dev/null 2>&1; then
                  echo "[nvme-bootstrap] mkfs.ext4 on $dev"
                  mkfs.ext4 -m 0 -E lazy_itable_init=1,lazy_journal_init=1 "$dev"
                fi

                target="$MNT_ROOT/$b"
                mkdir -p "$target"
                echo "[nvme-bootstrap] mounting $dev -> $target"
                mount -o defaults,noatime "$dev" "$target"
              done

              echo "[nvme-bootstrap] done; disks under $MNT_ROOT:"
              ls -l "$MNT_ROOT" || true
              # Stay alive so the DaemonSet pod is Running (not CrashLoop) and re-runs on restart.
              sleep infinity
          volumeMounts:
            - name: disks
              mountPath: /mnt/disks
              mountPropagation: Bidirectional
            - name: dev
              mountPath: /dev
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              # 512Mi headroom: `dnf install e2fsprogs util-linux` peaks well above 128Mi
              # (128Mi caused OOMKilled). After the one-time install the steady state is tiny.
              memory: "512Mi"
      volumes:
        - name: disks
          hostPath:
            path: /mnt/disks
            type: DirectoryOrCreate
        - name: dev
          hostPath:
            path: /dev
