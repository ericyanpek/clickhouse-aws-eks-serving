apiVersion: "clickhouse-keeper.altinity.com/v1"
kind: "ClickHouseKeeperInstallation"
metadata:
  name: keeper
  namespace: clickhouse
spec:
  configuration:
    clusters:
      - name: keeper
        layout:
          replicasCount: 3
    settings:
      logger/level: "information"
  defaults:
    templates:
      podTemplate: keeper-pod
      dataVolumeClaimTemplate: keeper-data
  templates:
    podTemplates:
      - name: keeper-pod
        metadata:
          labels:
            app: clickhouse-keeper # MUST be set here — the anti-affinity/spread selectors below match this
        spec:
          nodeSelector:
            workload: keeper
          tolerations:
            - key: dedicated
              operator: Equal
              value: keeper
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: clickhouse-keeper
                  topologyKey: kubernetes.io/hostname
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app: clickhouse-keeper
          containers:
            - name: clickhouse-keeper
              # 25.3 LTS: operator 0.27.1 injects coordination settings (use_xid_64,
              # async_replication) that 24.8 rejects with UNKNOWN_SETTING. Keeper + server
              # image versions must be compatible with the operator's rendered config.
              image: "clickhouse/clickhouse-keeper:25.3"
              resources:
                requests:
                  cpu: "1"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
    volumeClaimTemplates:
      - name: keeper-data
        spec:
          storageClassName: gp3-encrypted
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
# NOTE: no manual PodDisruptionBudget here — the Altinity operator auto-creates a Keeper
# PDB (chk-keeper-keeper, maxUnavailable:1) that protects the Raft quorum. A second manual
# PDB selecting the same pods causes "matches multiple PodDisruptionBudgets" warnings.
