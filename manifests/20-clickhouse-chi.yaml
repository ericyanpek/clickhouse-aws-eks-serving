apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: ch
  namespace: clickhouse
spec:
  defaults:
    templates:
      podTemplate: ch-pod
      dataVolumeClaimTemplate: ch-data
      serviceTemplate: ch-cluster-ip
  configuration:
    zookeeper:
      nodes:
        - host: keeper-keeper.clickhouse.svc.cluster.local
          port: 2181
    users:
      admin/password_sha256_hex: "" # set via secret at apply; placeholder documented in README
      admin/networks/ip: "::/0"
      admin/profile: default
    clusters:
      - name: main
        layout:
          shardsCount: 2
          replicasCount: 2
  templates:
    serviceTemplates:
      - name: ch-cluster-ip
        spec:
          type: ClusterIP
          ports:
            - name: http
              port: 8123
            - name: native
              port: 9000
    podTemplates:
      - name: ch-pod
        spec:
          nodeSelector:
            workload: clickhouse
          tolerations:
            - key: dedicated
              operator: Equal
              value: clickhouse
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      clickhouse.altinity.com/app: chop
                  topologyKey: kubernetes.io/hostname
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  clickhouse.altinity.com/app: chop
          containers:
            - name: clickhouse
              image: "clickhouse/clickhouse-server:24.8"
              resources:
                requests:
                  cpu: "2"
                  memory: "8Gi"
                limits:
                  cpu: "4"
                  memory: "12Gi"
            - name: clickhouse-backup
              image: "altinity/clickhouse-backup:2.6.0"
              args: ["server"]
              env:
                - name: LOG_LEVEL
                  value: "info"
                - name: REMOTE_STORAGE
                  value: "s3"
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: clickhouse-backup-config
                      key: S3_BUCKET
                - name: S3_REGION
                  valueFrom:
                    configMapKeyRef:
                      name: clickhouse-backup-config
                      key: S3_REGION
                - name: S3_PATH
                  value: "backup"
              ports:
                - name: backup-rest
                  containerPort: 7171
    volumeClaimTemplates:
      - name: ch-data
        spec:
          storageClassName: local-storage
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 800Gi # matches i4i.xlarge instance-store; adjust per instance
