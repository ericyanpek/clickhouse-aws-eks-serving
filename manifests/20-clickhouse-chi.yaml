apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: ch
  namespace: clickhouse
spec:
  defaults:
    templates:
      podTemplate: ch-pod
      dataVolumeClaimTemplate: ch-data
      serviceTemplate: ch-cluster-ip
  configuration:
    zookeeper:
      nodes:
        - host: keeper-keeper.clickhouse.svc.cluster.local
          port: 2181
    users:
      # SECURITY: empty password_sha256_hex = passwordless admin. Left empty as a placeholder —
      # set a real sha256 hash AND widen networks/ip before use. See README "Set the admin password".
      # Default networks/ip is localhost-only so a bare `kubectl apply` does NOT expose an open superuser.
      admin/password_sha256_hex: ""
      admin/networks/ip: "127.0.0.1/32"
      admin/profile: default
    clusters:
      - name: main
        layout:
          shardsCount: 2
          replicasCount: 2
  templates:
    serviceTemplates:
      - name: ch-cluster-ip
        spec:
          type: ClusterIP
          ports:
            - name: http
              port: 8123
            - name: native
              port: 9000
    podTemplates:
      - name: ch-pod
        spec:
          # backup sidecar assumes the S3 IAM role via IRSA through this SA
          # (created in 30-backup-cronjob.yaml — must be applied before this CHI).
          serviceAccountName: clickhouse-backup
          nodeSelector:
            workload: clickhouse
          tolerations:
            - key: dedicated
              operator: Equal
              value: clickhouse
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      clickhouse.altinity.com/app: chop
                      clickhouse.altinity.com/chi: ch
                  topologyKey: kubernetes.io/hostname
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  clickhouse.altinity.com/app: chop
                  clickhouse.altinity.com/chi: ch
          containers:
            - name: clickhouse
              image: "clickhouse/clickhouse-server:24.8"
              resources:
                requests:
                  cpu: "2"
                  memory: "8Gi"
                limits:
                  cpu: "4"
                  memory: "12Gi"
            - name: clickhouse-backup
              image: "altinity/clickhouse-backup:2.6.0"
              args: ["server"]
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
              env:
                - name: LOG_LEVEL
                  value: "info"
                - name: REMOTE_STORAGE
                  value: "s3"
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: clickhouse-backup-config
                      key: S3_BUCKET
                - name: S3_REGION
                  valueFrom:
                    configMapKeyRef:
                      name: clickhouse-backup-config
                      key: S3_REGION
                - name: S3_PATH
                  value: "backup"
              ports:
                - name: backup-rest
                  containerPort: 7171
    volumeClaimTemplates:
      - name: ch-data
        spec:
          storageClassName: local-storage
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 800Gi # matches i4i.xlarge instance-store; adjust per instance
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ch-pdb
  namespace: clickhouse
spec:
  minAvailable: 2
  selector:
    matchLabels:
      clickhouse.altinity.com/chi: ch
